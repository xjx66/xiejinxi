<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniunion</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
                "talkinghead": "./TalkingHead/modules/talkinghead.mjs",
                "headtts": "./HeadTTS/modules/headtts.mjs"
            }
        }
    </script>
</head>
<body>
    <div id="scroll-progress"></div>
    <canvas id="particles"></canvas>
    
    <div id="offline-indicator"></div>
    <div class="container" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0; margin: 0; overflow: hidden;">
        
        <section class="talkinghead-section" style="width: 100%; max-width: 960px; position: relative; height: 800px; /* overflow: hidden; Removed to show models outside container */">
            <div id="carousel-turntable" style="width: 100%; height: 100%; position: absolute; cursor: pointer;">
                <!-- JS will inject model containers here -->
            </div>
            
            <!-- 将输入框容器改为绝对定位，叠加在 talkinghead 上方 -->
            <div id="talkinghead-input-container" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; justify-content: center; z-index: 10; transition: opacity 0.3s ease;">
                <input type="text" id="talkinghead-text" autocomplete="off" placeholder="say something..." style="width: 200px; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: white; font-size: 16px; transition: all 0.3s ease; backdrop-filter: blur(5px);">
                <button id="talkinghead-speak" style="display: none; padding: 12px 24px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-size: 16px; transition: all 0.3s;">说话</button>
            </div>
            <div id="talkinghead-loading" style="display: none; text-align: center; color: rgba(255,255,255,0.6); margin-top: 10px; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);"></div>
        </section>

        <section class="decals-section" style="width: 100%; max-width: 1200px;">
            <div id="decals-container" style="width: 100%; height: 900px;"></div>
        </section>

        <section class="robot-section" style="width: 100%; max-width: 1200px;">
            <div id="robot-container" style="width: 100%; height: 600px; position: relative;"></div>
        </section>

        <button id="themeToggle" class="theme-toggle">🌖</button>

        <div id="hearts-container"></div>
        <div id="cursor-follower"></div>

    <div id="floating-quote"></div>

    </div>
    <script src="script.js?v=2"></script>
    <script type="module" src="decals.js?v=3"></script>
    <script type="module" src="robot.js?v=3"></script>
    <script type="module" src="talkinghead.js?v=3"></script>
</body>
</html>
